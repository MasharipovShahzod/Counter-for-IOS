name: Build IPA

# Run manually from the Actions tab, or on every push to main.
on:
  workflow_dispatch:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: macos-14   # free GitHub-hosted macOS runner (has Xcode preinstalled)
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate Xcode project
        run: xcodegen generate

      - name: Build (unsigned)
        run: |
          xcodebuild \
            -project FitnessTracker.xcodeproj \
            -scheme FitnessTracker \
            -configuration Release \
            -sdk iphoneos \
            -derivedDataPath build \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            build

      - name: Package into .ipa
        run: |
          mkdir -p Payload
          cp -R build/Build/Products/Release-iphoneos/FitnessTracker.app Payload/
          zip -qr FitnessTracker-unsigned.ipa Payload

      - name: Upload .ipa artifact
        uses: actions/upload-artifact@v4
        with:
          name: FitnessTracker-ipa
          path: FitnessTracker-unsigned.ipa
          if-no-files-found: error
