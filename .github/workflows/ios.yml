name: Build IPA

# Run manually from the Actions tab, on every push to main, and on every PR
# targeting main.
#
# The pull_request trigger is the one that earns its keep: without it nothing
# compiled or ran the tests until code was already ON main, which makes CI a
# post-mortem rather than a gate.
on:
  workflow_dispatch:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: macos-14   # free GitHub-hosted macOS runner (has Xcode preinstalled)
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # THE XCODE VERSION IS RESOLVED, NOT LEFT IMPLICIT.
      #
      # `brew install xcodegen` below always installs the LATEST XcodeGen, which
      # emits an Xcode-16-era project format (objectVersion 77). The macos-14
      # image's DEFAULT Xcode is 15.4, which cannot read that format and fails
      # with "future Xcode project file format (77)" — reported, unhelpfully, as
      # exit 74 (EX_IOERR), the same "looks like a broken runner" disguise the
      # destination bug wore below. Every run in this repo's history died here,
      # before a single line was compiled.
      #
      # Resolved rather than hardcoded for exactly the reason the simulator
      # destination is: a pinned version goes stale the moment the image changes,
      # and asking the runner what it actually has cannot.
      - name: Select the newest installed Xcode
        run: |
          set -eo pipefail
          # Logged on every run: when this fails, the first question is always
          # "what was available?" — so answer it up front.
          ls -d /Applications/Xcode*.app
          NEWEST=$(ls -d /Applications/Xcode*.app | sort -V | tail -1)
          echo "Selecting $NEWEST"
          sudo xcode-select -s "$NEWEST/Contents/Developer"
          xcodebuild -version

      - name: Install XcodeGen
        run: |
          # The runner image preinstalls aws/tap, which Homebrew's tap-trust
          # check refuses to read and then warns about at length on every run.
          # We never use it, and the noise buries real errors — drop it.
          brew untap aws/tap 2>/dev/null || true
          brew install xcodegen

      - name: Generate Xcode project
        run: xcodegen generate

      # Runs before the build so a logic regression fails fast, and because the
      # build below targets `iphoneos` (a device SDK) which cannot run tests —
      # tests need a simulator destination.
      #
      # THE DESTINATION IS RESOLVED, NOT HARDCODED.
      # This step used to pin `name=iPhone 15`, and broke the moment the macos-14
      # image shipped an Xcode whose bundled runtimes start at the iPhone 16
      # family: the simulator simply wasn't there any more. That failure is
      # nastier than it sounds, because xcodebuild reports an unmatched
      # destination as exit 74 (EX_IOERR) — an "I/O error", which reads like a
      # broken runner rather than "that device does not exist". Asking the
      # runner what it actually has costs one command and cannot go stale.
      - name: Run unit tests
        run: |
          set -eo pipefail

          # Logged on every run: when this step does fail, the first question is
          # always "what was available?" — so answer it up front.
          xcrun simctl list devices available

          DEVICE_ID=$(xcrun simctl list devices available --json \
            | jq -r '[.devices[][] | select(.name | test("^iPhone"))] | .[0].udid // empty')

          if [ -z "$DEVICE_ID" ]; then
            echo "::error::No iPhone simulator available on this runner image."
            exit 1
          fi
          echo "Testing on simulator $DEVICE_ID"

          xcodebuild test \
            -project FitnessTracker.xcodeproj \
            -scheme FitnessTracker \
            -destination "id=$DEVICE_ID" \
            CODE_SIGNING_ALLOWED=NO

      - name: Build (unsigned)
        run: |
          xcodebuild \
            -project FitnessTracker.xcodeproj \
            -scheme FitnessTracker \
            -configuration Release \
            -sdk iphoneos \
            -derivedDataPath build \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            build

      - name: Package into .ipa
        run: |
          mkdir -p Payload
          cp -R build/Build/Products/Release-iphoneos/FitnessTracker.app Payload/
          zip -qr FitnessTracker-unsigned.ipa Payload

      - name: Upload .ipa artifact
        uses: actions/upload-artifact@v4
        with:
          name: FitnessTracker-ipa
          path: FitnessTracker-unsigned.ipa
          if-no-files-found: error
